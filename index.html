<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <link rel="icon" type="image/png" href="assets/images/favicon.png"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nexum Business SAC | Soluciones Cloud, Moodle y Software Empresarial</title>
  <meta name="description" content="Implementación Moodle, Oracle Cloud (OCI), desarrollo de plugins y arquitecturas cloud. +10 años transformando empresas con tecnología robusta. Lima, Perú."/>
  <meta name="robots" content="index, follow"/>
  <!-- Redirect al dark mode por defecto, respetando preferencia del sistema -->
  <script>
    (function() {
      var stored = localStorage.getItem('nexum-theme');
      var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = stored || (prefersDark ? 'dark' : 'light');
      window.location.replace(theme + '/inicio.html');
    })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0;url=dark/inicio.html"/>
  </noscript>
</head>
<body>
  <p>Redirigiendo a <a href="dark/inicio.html">Nexum Business SAC</a>...</p>
</body>
</html>
